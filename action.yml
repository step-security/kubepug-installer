name: install-kubepug
description: 'Install Kubepug and put it on your path'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  kubepug-release:
    description: 'Kubepug release version to use in the actions.'
    required: false
    default: '1.7.1'
  install-dir:
    description: 'Where to install the Kubepug binary'
    required: false
    default: '$HOME/.kubepug'
  use-sudo:
    description: 'set to true if install-dir location requires sudo privs'
    required: false
    default: 'false'
runs:
  using: "composite"
  steps:
    - name: Subscription check
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        UPSTREAM="kubepug/kubepug"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
            echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
            exit 1
          fi
        fi
      shell: bash

    - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      with:
        install-dir: ${{ inputs.install-dir }}
        use-sudo: ${{ inputs.use-sudo }}
    - shell: bash
      run: |
        #!/bin/bash
        # bom install script
        shopt -s expand_aliases
        if [ -z "$NO_COLOR" ]; then
          alias log_info="echo -e \"\033[1;32mINFO\033[0m:\""
          alias log_error="echo -e \"\033[1;31mERROR\033[0m:\""
        else
          alias log_info="echo \"INFO:\""
          alias log_error="echo \"ERROR:\""
        fi
        set -e

        mkdir -p ${{ inputs.install-dir }}

        trap "popd >/dev/null" EXIT

        pushd ${{ inputs.install-dir }} > /dev/null
        bom_executable_name='bom'
        case ${{ runner.os }} in
          Linux)
            case ${{ runner.arch }} in
              X64)
                desired_kubepug_filename='kubepug_linux_amd64.tar.gz'
                ;;

              ARM)
                desired_kubepug_filename='kubepug_linux_arm.tar.gz'
                ;;

              ARM64)
                desired_kubepug_filename='kubepug_linux_arm64.tar.gz'
                ;;

              *)
                log_error "unsupported architecture $arch"
                exit 1
                ;;
            esac
            ;;

          macOS)
            case ${{ runner.arch }} in
              X64)
                desired_kubepug_filename='kubepug_darwin_amd64.tar.gz'
                ;;

              ARM64)
                desired_kubepug_filename='kubepug_darwin_arm64.tar.gz'
                ;;

              *)
                log_error "unsupported architecture $arch"
                exit 1
                ;;
            esac
            ;;

          Windows)
            case ${{ runner.arch }} in
              X64)
                desired_kubepug_filename='kubepug_windows_amd64.zip'
                bom_executable_name=bom.exe
                ;;
              *)
                log_error "unsupported architecture $arch"
                exit 1
                ;;
            esac
            ;;
          *)
            log_error "unsupported architecture $arch"
            exit 1
            ;;
        esac

        USE_SUDO_RAW='${{ inputs.use-sudo }}'  # literal template expanded by runner
        USE_SUDO_LOWER=$(echo "$USE_SUDO_RAW" | tr '[:upper:]' '[:lower:]')
        case "$USE_SUDO_LOWER" in
          true)  use_sudo=true ;;
          false) use_sudo=false ;;
          *)     echo "use-sudo must be true or false (got: ${USE_SUDO_RAW})" >&2; exit 1 ;;
        esac

        sudo_cmd=()
        if $use_sudo && command -v sudo >/dev/null 2>&1; then
          sudo_cmd=(sudo)
        fi

        semver='^([0-9]+\.){0,2}(\*|[0-9]+)$'
        if [[ ${{ inputs.kubepug-release }} =~ $semver ]]; then
          log_info "Custom bom version '${{ inputs.kubepug-release }}' requested"
        else
          log_error "Unable to validate requested bom version: '${{ inputs.kubepug-release }}'"
          exit 1
        fi

        # Download custom bom
        log_info "Downloading platform-specific version '${{ inputs.kubepug-release }}' of Kubepug...\n      https://github.com/kubepug/kubepug/releases/download/v${{ inputs.kubepug-release }}/${desired_kubepug_filename}"
        "${sudo_cmd[@]}" curl -sL "https://github.com/kubepug/kubepug/releases/download/v${{ inputs.kubepug-release }}/${desired_kubepug_filename}" -o "${desired_kubepug_filename}"

        KUBEPUG_CERT="https://github.com/kubepug/kubepug/releases/download/v${{ inputs.kubepug-release }}/${desired_kubepug_filename}.pem"
        KUBEPUG_SIG="https://github.com/kubepug/kubepug/releases/download/v${{ inputs.kubepug-release }}/${desired_kubepug_filename}.sig"

        log_info "Using cosign to verify signature of desired kubepug version"
        cosign verify-blob --certificate "$KUBEPUG_CERT" --signature "$KUBEPUG_SIG" \
          --certificate-identity "https://github.com/kubepug/kubepug/.github/workflows/release.yaml@refs/tags/v${{ inputs.kubepug-release }}" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com" "${desired_kubepug_filename}"
        retVal=$?
        if [[ $retVal -eq 0 ]]; then
          if [[ "${desired_kubepug_filename}" == *".zip"*  ]]; then
            7z x "${desired_kubepug_filename}"
          else
            "${sudo_cmd[@]}" tar -zxvf "${desired_kubepug_filename}"
          fi
          "${sudo_cmd[@]}" chmod +x kubepug
          "${sudo_cmd[@]}" rm -f kubepug_*
          log_info "Installation complete!"
        else
          log_error "Unable to validate bom version: '${{ inputs.kubepug-release }}'"
          exit 1
        fi

    - if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
      run: echo "${{ inputs.install-dir }}" >> $GITHUB_PATH
      shell: bash
    - if: ${{ runner.os == 'Windows' }}
      run: echo "${{ inputs.install-dir }}" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh
